# DO NOT add dynamic content to this file (no dates, no task IDs)
# This file is prompt-cached by the LLM API after first call

project: ACPEnhanced-Visual
type: web-app                  # web dashboard / visualization tool
description: >
  Web dashboard that renders ACP Enhanced's agent/progress.yaml into an
  interactive, sortable, searchable UI with milestone tables, task trees,
  fuzzy search, status filtering, and auto-refresh via file watcher.

stack:
  runtime: Node.js 22+
  language: TypeScript 5.x (strict mode)
  framework: TanStack Start (React 19 SSR)
  ui: React 19 + Tailwind CSS 4
  table: @tanstack/react-table 8
  search: fuse.js 7
  parsing: js-yaml 4 + Zod 4
  router: @tanstack/react-router 1 (file-based)
  testing: Vitest 4 + @testing-library/react 16 + jsdom 28
  build: Vite 8 + @vitejs/plugin-react
  icons: lucide-react

team: solo-developer
priorities:
  - code-quality
  - correctness
  - maintainability
  - performance (fast fuzzy search, low-overhead polling)

repo: github.com/ssucipto/ACPEnhanced-Visual

progress_yaml_target:
  source: ssucipto/acp-enhanced
  version: 6.8.2
  verified_date: 2026-06-03
  notes: "Schema verified against real ACP Enhanced progress.yaml (5354 lines, 45+ milestones)"
